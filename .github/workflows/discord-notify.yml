name: Discord Notify

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled, closed]
  pull_request:
    types: [opened, closed]

permissions:
  issues: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ secrets.DISCORD_WEBHOOK != '' || vars.DISCORD_WEBHOOK_CONFIGURED == 'true' }}
    steps:
      - name: Skip silently if no webhook configured
        if: ${{ env.DISCORD_WEBHOOK == '' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          echo "DISCORD_WEBHOOK secret not set тАФ skipping."
          exit 0

      - name: Build payload тАФ Issue comment (LIVE FEED #19)
        if: ${{ github.event_name == 'issue_comment' && github.event.issue.number == 19 }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          AUTHOR: ${{ github.event.comment.user.login }}
          BODY: ${{ github.event.comment.body }}
          URL: ${{ github.event.comment.html_url }}
        run: |
          # Tronca body a 1500 char (limite Discord 2000)
          SHORT=$(printf '%s' "$BODY" | head -c 1500)
          PAYLOAD=$(jq -n \
            --arg content "ЁЯУК **LIVE FEED** тАФ @$AUTHOR\n$SHORT\n\n[apri commento]($URL)" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null

      - name: Build payload тАФ Bug issue opened
        if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'bug') }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NUM: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "ЁЯРЫ **BUG APERTO** тАФ #$NUM\n**$TITLE**\nby @$AUTHOR\n$URL" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null

      - name: Build payload тАФ Issue labeled with release-blocker
        if: ${{ github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'release-blocker' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NUM: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "ЁЯЪи **RELEASE-BLOCKER** тАФ #$NUM\n**$TITLE**\n$URL" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null

      - name: Build payload тАФ PR opened
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "ЁЯУд **PR APERTO** тАФ #$NUM\n**$TITLE**\nby @$AUTHOR\n$URL" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null

      - name: Build payload тАФ PR merged
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          URL: ${{ github.event.pull_request.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "ЁЯОЙ **PR MERGIATO** тАФ #$NUM\n**$TITLE**\n$URL" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null

      - name: Build payload тАФ Issue closed
        if: ${{ github.event_name == 'issues' && github.event.action == 'closed' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NUM: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          URL: ${{ github.event.issue.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg content "тЬЕ **Issue chiusa** тАФ #$NUM\n$TITLE\n$URL" \
            '{content: $content}')
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK" >/dev/null
