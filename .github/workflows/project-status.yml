name: Project Status Auto-Move

# Sposta automaticamente le card del Project v2 in base agli eventi del repo.
# Niente AI, niente intervento del dev — server-side via gh CLI.
#
# Transizioni gestite:
#   issues:opened        → add to project + Status=Backlog
#   issues:assigned      → Status=Todo (marca come pronta)
#   issues:closed        → Status=Done
#   issues:reopened      → Status=Backlog
#   pull_request:opened/ready_for_review (not draft) → linked issue → Status=In review
#   pull_request:converted_to_draft → linked issue → Status=In Progress
#   pull_request:closed && merged    → linked issue → Status=Done   (FIX bug pre-2026-04-28)
#   pull_request:closed && !merged   → linked issue → Status=Todo   (rollback)
#   pull_request:reopened            → linked issue → Status=In review
#   create branch feat/issue-N-*     → issue N → Status=In Progress
#   issues:labeled post-mvp          → Status=Post-MVP   (deescalation dal PM)
#   issues:unlabeled post-mvp        → Status=Todo (se assignee) o Backlog

on:
  pull_request:
    types: [opened, ready_for_review, converted_to_draft, closed, reopened]
  create:
  issues:
    types: [opened, closed, reopened, assigned, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  PROJECT_ID: PVT_kwDOEKlBHc4BV0Bd
  STATUS_FIELD: PVTSSF_lADOEKlBHc4BV0BdzhRNDOI
  OPT_BACKLOG: 2c317b0f
  OPT_TODO: ac32856e
  OPT_IN_PROGRESS: d84c070b
  OPT_IN_REVIEW: 92833a21
  OPT_DONE: 54560bd3

jobs:
  move-card:
    runs-on: ubuntu-latest
    steps:
      # ─────────────────────────────────────────────────────
      # ISSUE: opened → add to project (idempotent) + Status=Backlog
      # ─────────────────────────────────────────────────────
      - name: Issue opened → add + Backlog
        if: github.event_name == 'issues' && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE: ${{ github.event.issue.node_id }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Add to project (idempotent — returns existing item if already there)
          ITEM_ID=$(gh api graphql -f query='
            mutation($p: ID!, $c: ID!) {
              addProjectV2ItemById(input: { projectId: $p, contentId: $c }) {
                item { id }
              }
            }' -F p="$PROJECT_ID" -F c="$ISSUE_NODE" --jq '.data.addProjectV2ItemById.item.id')
          if [ -z "$ITEM_ID" ]; then echo "failed to add #$ISSUE_NUM"; exit 0; fi
          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_BACKLOG" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → Backlog"

      # ─────────────────────────────────────────────────────
      # ISSUE: assigned → Status=Todo (issue ready to work on)
      # ─────────────────────────────────────────────────────
      - name: Issue assigned → Todo
        if: github.event_name == 'issues' && github.event.action == 'assigned'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($repo: ID!, $num: Int!) {
              node(id: $repo) {
                ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
              }
            }' -F repo="$REPO_NODE" -F num=$ISSUE_NUM \
            --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" | head -1)
          if [ -z "$ITEM_ID" ]; then echo "issue #$ISSUE_NUM not in project, skip"; exit 0; fi
          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_TODO" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → Todo"

      # ─────────────────────────────────────────────────────
      # ISSUE: closed → Status=Done
      # ─────────────────────────────────────────────────────
      - name: Issue closed → Done
        if: github.event_name == 'issues' && github.event.action == 'closed'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($repo: ID!, $num: Int!) {
              node(id: $repo) {
                ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
              }
            }' -F repo="$REPO_NODE" -F num=$ISSUE_NUM \
            --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" | head -1)
          if [ -z "$ITEM_ID" ]; then echo "issue #$ISSUE_NUM not in project, skip"; exit 0; fi
          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_DONE" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → Done"

      # ─────────────────────────────────────────────────────
      # ISSUE: reopened → Status=Backlog
      # ─────────────────────────────────────────────────────
      - name: Issue reopened → Backlog
        if: github.event_name == 'issues' && github.event.action == 'reopened'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($repo: ID!, $num: Int!) {
              node(id: $repo) {
                ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
              }
            }' -F repo="$REPO_NODE" -F num=$ISSUE_NUM \
            --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" | head -1)
          if [ -z "$ITEM_ID" ]; then echo "issue #$ISSUE_NUM not in project, skip"; exit 0; fi
          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_BACKLOG" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → Backlog (reopened)"

      # ─────────────────────────────────────────────────────
      # PR Helper: extract issue numbers from PR body (Closes/Fixes/Refs #N)
      # ─────────────────────────────────────────────────────
      - name: Extract linked issues from PR
        id: extract
        if: github.event_name == 'pull_request'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          NUMS=$(printf '%s' "$BODY" | grep -ioE '(close[sd]?|fixe[sd]?|resolve[sd]?|refs?)\s+#[0-9]+' | grep -oE '[0-9]+' | sort -u | tr '\n' ' ')
          echo "issues=$NUMS" >> "$GITHUB_OUTPUT"
          echo "Found linked issues: $NUMS"

      # ─────────────────────────────────────────────────────
      # PR opened / ready_for_review (not draft) / reopened → linked issue → "In review"
      # ─────────────────────────────────────────────────────
      - name: PR open/ready/reopened → linked issues → In review
        if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'reopened') && !github.event.pull_request.draft
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUES: ${{ steps.extract.outputs.issues }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          for N in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='
              query($repo: ID!, $num: Int!) {
                node(id: $repo) {
                  ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
                }
              }' -F repo="$REPO_NODE" -F num=$N \
              --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
            if [ -z "$ITEM_ID" ]; then echo "issue #$N not in project, skip"; continue; fi
            gh api graphql -f query='
              mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $p, itemId: $i, fieldId: $f,
                  value: { singleSelectOptionId: $v }
                }) { clientMutationId }
              }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_IN_REVIEW" >/dev/null
            echo "✓ Issue #$N → In review"
          done

      # ─────────────────────────────────────────────────────
      # PR converted to draft → linked issue → "In Progress"
      # ─────────────────────────────────────────────────────
      - name: PR draft → linked issues → In Progress
        if: github.event_name == 'pull_request' && github.event.action == 'converted_to_draft'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUES: ${{ steps.extract.outputs.issues }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          for N in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='
              query($repo: ID!, $num: Int!) {
                node(id: $repo) {
                  ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
                }
              }' -F repo="$REPO_NODE" -F num=$N \
              --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='
              mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $p, itemId: $i, fieldId: $f,
                  value: { singleSelectOptionId: $v }
                }) { clientMutationId }
              }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_IN_PROGRESS" >/dev/null
            echo "✓ Issue #$N → In Progress (draft)"
          done

      # ─────────────────────────────────────────────────────
      # PR closed && MERGED → linked issue → "Done"   (FIX bug pre-2026-04-28)
      # ─────────────────────────────────────────────────────
      - name: PR merged → linked issues → Done
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUES: ${{ steps.extract.outputs.issues }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          for N in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='
              query($repo: ID!, $num: Int!) {
                node(id: $repo) {
                  ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
                }
              }' -F repo="$REPO_NODE" -F num=$N \
              --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='
              mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $p, itemId: $i, fieldId: $f,
                  value: { singleSelectOptionId: $v }
                }) { clientMutationId }
              }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_DONE" >/dev/null
            echo "✓ Issue #$N → Done (PR merged)"
          done

      # ─────────────────────────────────────────────────────
      # PR closed && NOT merged → linked issue → "Todo" (rollback)
      # ─────────────────────────────────────────────────────
      - name: PR closed unmerged → linked issues → Todo
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUES: ${{ steps.extract.outputs.issues }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          for N in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='
              query($repo: ID!, $num: Int!) {
                node(id: $repo) {
                  ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
                }
              }' -F repo="$REPO_NODE" -F num=$N \
              --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='
              mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $p, itemId: $i, fieldId: $f,
                  value: { singleSelectOptionId: $v }
                }) { clientMutationId }
              }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_TODO" >/dev/null
            echo "✓ Issue #$N → Todo (PR closed unmerged)"
          done

      # ─────────────────────────────────────────────────────
      # ISSUE: labeled `post-mvp` → Status=Post-MVP (deescalation dal PM)
      # Option ID resolved dinamicamente da name (resilient se Project options cambiano)
      # ─────────────────────────────────────────────────────
      - name: Issue labeled post-mvp → Post-MVP
        if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'post-mvp'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE: ${{ github.event.issue.node_id }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          OPT_POST_MVP=$(gh api graphql -f query='
            query($project: ID!, $field: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  field(id: $field) {
                    ... on ProjectV2SingleSelectField {
                      options { id name }
                    }
                  }
                }
              }
            }' -F project="$PROJECT_ID" -F field="$STATUS_FIELD" --jq '.data.node.field.options[] | select(.name == "Post-MVP") | .id')

          if [ -z "$OPT_POST_MVP" ]; then
            echo "Post-MVP option not yet created in Project — run setup-post-mvp-status.yml first"
            exit 0
          fi

          ITEM_ID=$(gh api graphql -f query='
            mutation($p: ID!, $c: ID!) {
              addProjectV2ItemById(input: { projectId: $p, contentId: $c }) {
                item { id }
              }
            }' -F p="$PROJECT_ID" -F c="$ISSUE_NODE" --jq '.data.addProjectV2ItemById.item.id')

          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_POST_MVP" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → Post-MVP (label post-mvp added)"

      # ─────────────────────────────────────────────────────
      # ISSUE: unlabeled `post-mvp` → Status=Todo (se assignee) o Backlog
      # Riprende lavoro quando PM dice "ripristino X"
      # ─────────────────────────────────────────────────────
      - name: Issue unlabeled post-mvp → Todo/Backlog
        if: github.event_name == 'issues' && github.event.action == 'unlabeled' && github.event.label.name == 'post-mvp'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_NODE: ${{ github.event.repository.node_id }}
          HAS_ASSIGNEE: ${{ github.event.issue.assignees[0] != null }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($repo: ID!, $num: Int!) {
              node(id: $repo) {
                ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
              }
            }' -F repo="$REPO_NODE" -F num=$ISSUE_NUM \
            --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
          [ -z "$ITEM_ID" ] && { echo "issue #$ISSUE_NUM not in project"; exit 0; }

          TARGET="$OPT_BACKLOG"; TARGET_NAME="Backlog"
          if [ "$HAS_ASSIGNEE" = "true" ]; then
            TARGET="$OPT_TODO"; TARGET_NAME="Todo"
          fi

          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$TARGET" >/dev/null
          echo "✓ Issue #$ISSUE_NUM → $TARGET_NAME (label post-mvp removed)"

      # ─────────────────────────────────────────────────────
      # Branch creato `feat/issue-N-*` → issue N → "In Progress"
      # ─────────────────────────────────────────────────────
      - name: Branch created → issue → In Progress
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          REF: ${{ github.event.ref }}
          REPO_NODE: ${{ github.event.repository.node_id }}
        run: |
          N=$(echo "$REF" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$N" ]; then echo "branch $REF not pattern feat/issue-N-*, skip"; exit 0; fi
          ITEM_ID=$(gh api graphql -f query='
            query($repo: ID!, $num: Int!) {
              node(id: $repo) {
                ... on Repository { issue(number: $num) { projectItems(first: 5) { nodes { id project { id } } } } }
              }
            }' -F repo="$REPO_NODE" -F num=$N \
            --jq ".data.node.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null | head -1)
          [ -z "$ITEM_ID" ] && { echo "issue #$N not in project"; exit 0; }
          gh api graphql -f query='
            mutation($p: ID!, $i: ID!, $f: ID!, $v: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $p, itemId: $i, fieldId: $f,
                value: { singleSelectOptionId: $v }
              }) { clientMutationId }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$STATUS_FIELD" -F v="$OPT_IN_PROGRESS" >/dev/null
          echo "✓ Issue #$N → In Progress (branch $REF)"
