<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Siri handles commands. GIGI handles context, memory, planning, and permissioned action." />
  <meta name="theme-color" content="#000000" />
  <title>Kill Siri — GIGI</title>
  <style>
    :root {
      --black: #000;
      --white: #f5f2ea;
      --muted: rgba(245, 242, 234, 0.78);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    main {
      width: min(1120px, calc(100vw - 40px));
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 112px);
      line-height: 0.94;
      letter-spacing: -0.075em;
      font-weight: 950;
      text-wrap: balance;
    }

    h1 span {
      display: block;
    }

    .line-one {
      color: var(--muted);
    }

    .line-two {
      color: var(--white);
    }
  </style>
</head>
<body>
  <main aria-label="GIGI declaration">
    <h1>
      <span class="line-one">Siri handles commands.</span>
      <span class="line-two">GIGI handles life.</span>
    </h1>
  </main>
</body>
</html>
