<!DOCTYPE html>

<head>

<title>VARIANT C — Red full-bleed brutalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body { background: #ff0000; font-family: 'Space Grotesk', sans-serif; }
  .frame {
    position: fixed; inset: 0;
    display: grid; align-content: center;
    padding: 6vh 6vw; gap: 2vw;
  }
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.07) 0 1px, transparent 1px 3px);
  }
  .kicker {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: clamp(13px, 1.5vw, 22px);
    letter-spacing: .06em; color: #0a0a0a;
    text-transform: uppercase; justify-self: start;
  }
  .title {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(96px, 18vw, 280px);
    letter-spacing: -.12em; line-height: .65;
    color: #0a0a0a; text-transform: uppercase;
    justify-self: start;
  }
  .stamp {
    position: fixed; bottom: 4vh; right: 4vw; z-index: 10;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: #0a0a0a; opacity: .7; letter-spacing: .04em;
  }
  .label {
    position: fixed; top: 4vh; right: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #0a0a0a; padding: 6px 10px; border: 1px solid #0a0a0a;
    letter-spacing: .08em; background: rgba(255,255,255,.92);
  }
  .nav {
    position: fixed; bottom: 4vh; left: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #0a0a0a; letter-spacing: .04em;
  }
  .nav a { color: #0a0a0a; text-decoration: underline; margin-right: 12px; font-weight: 700; }
</style>
</head>
<body>
  <div class="frame">
    <span class="kicker">[ STOP STUPID VOICE ASSISTANTS LIKE SIRI ]</span>
    <span class="title">MAKE<br>BORN GIGI</span>

  <div class="label">VARIANT C · RED BRUTALIST</div>
