<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VARIANT A — Director's Cut V2 (bone on void + Riso)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body { background: #0a0a0a; font-family: 'Space Grotesk', sans-serif; }
  .frame {
    position: fixed; inset: 0;
    display: grid; align-content: center;
    padding: 4vh 6vw; gap: 2.4vw;
    background: #0a0a0a;
  }
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 4; opacity: .08;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  .kicker {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: clamp(13px, 1.4vw, 22px);
    letter-spacing: .06em; color: #ff0000;
    text-transform: uppercase; justify-self: start;
    transform: translateX(2vw);
  }
  .title {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(84px, 17vw, 260px);
    letter-spacing: -.115em; line-height: .68;
    color: #f5f5f0; text-transform: uppercase;
    justify-self: start;
    text-shadow: 4px 4px 0 #ff0000;
  }
  .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .stamp-tl, .stamp-br {
    position: fixed; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10px, .9vw, 14px);
    color: rgba(245,245,240,.5);
  }
  .stamp-tl { top: 4vh; left: 4vw; }
  .stamp-br { bottom: 4vh; right: 4vw; }
  .label {
    position: fixed; top: 4vh; right: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #ff0000; padding: 6px 10px; border: 1px solid #ff0000;
    letter-spacing: .08em;
  }
  .nav {
    position: fixed; bottom: 4vh; left: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(245,245,240,.6); letter-spacing: .04em;
  }
  .nav a { color: #ff0000; text-decoration: none; margin-right: 12px; }
</style>
</head>
<body>
  <div class="frame">
    <span class="kicker">[ STOP STUPID VOICE ASSISTANTS LIKE SIRI ]</span>
    <span class="title">MAKE<br>BORN GIGI<span class="blink">_</span></span>
  </div>
  <div class="grain"></div>
  <div class="scanlines"></div>
  <div class="stamp-tl" id="ts">// 2026.05.02 — 04:04:01 UTC</div>
  <div class="stamp-br">// REBEL.MANIFESTO.001</div>
  <div class="label">VARIANT A · DIRECTOR'S CUT</div>
  <div class="nav"><a href="/A/">A</a><a href="/B/">B</a><a href="/C/">C</a><a href="/">FULL</a></div>
  <script>
    const ts = document.getElementById('ts');
    function tick() {
      const d = new Date();
      const s = `// ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} — ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')} UTC`;
      ts.textContent = s;
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
