<style>

  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body { background: #f5f5f0; font-family: 'Space Grotesk', sans-serif; }
  .frame {
    position: fixed; inset: 0;

    text-transform: uppercase;

    font-size: clamp(72px, 14vw, 216px);
    letter-spacing: -.085em; line-height: .78;
    color: #0a0a0a; text-transform: uppercase;
    text-shadow: 5px 5px 0 #ff0000;
  }
  .label {
    position: fixed; top: 4vh; right: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #ff0000; padding: 6px 10px; border: 1px solid #ff0000;
    letter-spacing: .08em; background: rgba(245,245,240,.92);

  .nav {
    position: fixed; bottom: 4vh; left: 4vw; z-index: 11;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(10,10,10,.6); letter-spacing: .04em;
  }
  .nav a { color: #ff0000; text-decoration: none; margin-right: 12px; }
